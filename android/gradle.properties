org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# 工程位于 D 盘而 Pub 缓存在 C 盘时，部分插件的 Kotlin 增量缓存会出现跨根路径崩溃。
# 这里优先保证构建稳定性，关闭增量编译，代价只是 Android Kotlin 编译速度略慢。
kotlin.incremental=false
# 仍有上游插件未迁移到 Built-in Kotlin，这里保留 Flutter 3.44 的兼容开关，避免构建链提前切换后直接失败。
android.builtInKotlin=false
# Flutter 3.44 的新 AGP DSL 仍处于迁移期，先显式关闭新 DSL 以保持当前项目与旧插件链兼容。
android.newDsl=false
