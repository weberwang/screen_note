name: screen_note
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理与页面装配统一收口到 Riverpod 体系，覆盖输入、列表、历史与设置等核心流程。
  # Riverpod 运行时依赖统一按同代稳定版对齐，避免 UI、hooks 与 provider 核心能力出现跨代错配。
  flutter_riverpod: ^3.3.2
  flutter_hooks: ^0.21.3+1
  go_router: ^17.3.0
  hooks_riverpod: ^3.3.2
  flutter_screenutil: 5.9.3

  # 本地持久化用于保证任务、事件日志和最近删除在重启后仍能可靠保留。
  collection: ^1.19.1
  drift: ^2.29.0
  path: ^1.9.1
  sqlite3_flutter_libs: ^0.5.42
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5

  # 锁屏展示与通知提醒分别服务于小组件刷新和本地定时提醒能力。
  home_widget: ^0.9.3
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  flutter_timezone: ^5.1.0
  permission_handler: ^12.0.3

  # 领域模型后续会直接依赖序列化、格式化和唯一标识工具。
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  intl: ^0.20.2
  uuid: ^4.5.3

  # 初始化基线补齐网络与代码生成注解，后续远程接口可直接复用同一技术栈。
  dio: ^5.9.2
  retrofit: ^4.9.2
  flutter_secure_storage: ^10.3.1
  logger: ^2.7.0
  riverpod_annotation: ^4.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 生成器和 lint 包跟随 Riverpod 主包一起升级，减少后续重新解锁时 analyzer 侧的约束分叉。
  build_runner: ^2.7.1
  drift_dev: ^2.29.0
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  retrofit_generator: ^10.2.1
  riverpod_generator: ^4.0.4
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/history_center/
