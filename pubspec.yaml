name: screen_note
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理与页面导航覆盖输入、列表、历史与设置等核心流程。
  # 这里统一对齐到 Riverpod 3.0.3 版本族，避免 hooks 与核心包漂移到不同大版本。
  flutter_riverpod: ^3.0.3
  flutter_hooks: ^0.21.3+1
  go_router: ^17.3.0
  hooks_riverpod: ^3.0.3
  flutter_screenutil: 5.9.3

  # 本地持久化用于保证任务、事件日志和最近删除在重启后仍能可靠保留。
  collection: ^1.19.1
  drift: ^2.28.0
  path: ^1.9.1
  sqlite3_flutter_libs: ^0.5.42
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5

  # 锁屏展示与通知提醒分别服务于小组件刷新和本地定时提醒能力。
  home_widget: ^0.9.3
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  flutter_timezone: ^5.1.0

  # 领域模型后续会直接依赖序列化、格式化和唯一标识工具。
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  intl: ^0.20.2
  uuid: ^4.5.3

  # 初始化基线补齐网络与代码生成注解，后续远程接口直接复用同一技术栈。
  dio: ^5.9.2
  retrofit: ^4.9.2
  flutter_secure_storage: ^10.3.1
  logger: ^2.7.0
  riverpod_annotation: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Riverpod 3.x 会把 test 约束引入依赖图，这里把代码生成链统一固定在 analyzer < 8 的兼容窗口，
  # 避免与 flutter_test 固定的 test_api 版本发生求解冲突。
  build_runner: ^2.5.4
  drift_dev: ^2.28.0
  freezed: ^3.0.6
  json_serializable: ^6.9.2
  retrofit_generator: ^10.0.0
  riverpod_generator: ^3.0.3
  custom_lint: ^0.8.0
  riverpod_lint: ^3.0.3

flutter:
  generate: true
  uses-material-design: true
