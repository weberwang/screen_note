name: screen_note
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # 状态管理与页面导航覆盖输入、列表、历史与设置等核心流程。
  # Riverpod 3.x 会与当前 Flutter 3.35 / Dart 3.9 下的代码生成链路冲突，
  # 这里使用当前工程可稳定解析的最新兼容 2.x 版本。
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.3

  # 本地持久化用于保证任务、事件日志和最近删除在重启后仍能可靠保留。
  drift: ^2.31.0
  sqlite3_flutter_libs: ^0.5.42
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5

  # 锁屏展示与通知提醒分别服务于小组件更新和本地定时提醒能力。
  home_widget: ^0.9.1
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  flutter_timezone: ^5.0.2

  # 领域模型后续会直接依赖序列化、格式化和唯一标识工具。
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  intl: ^0.20.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # 代码生成链路需要与当前 SDK 保持可解，避免实体、数据库和 JSON 模型生成失效。
  build_runner: ^2.15.0
  drift_dev: ^2.31.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0

flutter:
  uses-material-design: true
